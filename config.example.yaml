# Mode selects the role of this instance.
#   "hub"   (default) — full dashboard: UI + servers registry + aggregator
#                       + local collectors + templates. Log in here to see
#                       and control your fleet.
#   "agent"           — headless: collectors + the API the hub calls
#                       (docker controls + exec, template deploys, log
#                       tailing, PM2, …). NO UI, NO registry, NO aggregator.
#                       Use this on the machines you only want to monitor.
#                       For the smallest footprint, build the dedicated
#                       `server-monitor-agent` binary instead.
mode: "hub"

server:
  bind: "0.0.0.0:8080"
  tls:
    enabled: false
    cert_file: ""
    key_file: ""
  # WebSocket Origin allowlist (hub mode). Browsers send an Origin header on
  # every WebSocket handshake; rejecting unknown origins prevents a malicious
  # page in the same browser from hijacking your logged-in session.
  #
  # Leave empty when the embedded UI and the API are served from the same
  # host:port — the default same-origin fallback handles that automatically.
  #
  # Set this when:
  #   - dev: Next.js dev server (port 3000) proxies to this backend on :8080
  #          → list the URL you actually type in the browser.
  #   - prod: dashboard is served from a different hostname than the API
  #          (reverse proxy with a custom name, separate UI domain, etc.).
  #
  # Agents do NOT need to set this — hub→agent proxy connections have no
  # Origin header and are allowed by default.
  allowed_origins: []
    # - "http://localhost:3000"
    # - "http://10.241.8.32:3000"   # your hub's LAN IP for the dev URL

data_dir: "./data"

metrics:
  # How often collectors sample (seconds).
  sample_interval: 1
  # How often samples are persisted to SQLite (seconds).
  persist_interval: 10
  # Retention for 1s/persisted rows.
  retention_short: "24h"
  # Retention for 1m rollup rows.
  retention_long: "30d"

processes:
  top_n: 50

logs:
  # Whitelist of log files the UI is allowed to tail.
  allowed_paths:
    - /var/log/syslog
    - /var/log/auth.log
    - /var/log/nginx/access.log
    - /var/log/nginx/error.log

docker:
  enabled: true
  socket: "/var/run/docker.sock"

gpu:
  enabled: true
  # "nvml" (preferred) or "nvidia-smi" (fallback). "auto" tries NVML first.
  backend: "auto"

templates:
  # Per-deployment workdirs (compose files, .env, support files) are created
  # here. Postgres + storage data still live inside Docker named volumes that
  # are namespaced with the deployment slug. Leave empty to use the default
  # "{data_dir}/templates".
  storage_root: ""
