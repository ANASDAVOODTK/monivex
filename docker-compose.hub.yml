# Monivex hub — the dashboard you log into. One per fleet.
#
#   docker compose -f docker-compose.hub.yml up -d
#   docker compose -f docker-compose.hub.yml logs -f      # see first-run setup token
#
# Then open  http://<this-host>:8080/setup  to create the admin user.
#
# Why pid/network host + privileged?  A container is isolated from its host by
# default — it would only see its OWN processes, network and metrics. To
# monitor the *host* the container has to share the host's namespaces. This is
# exactly how netdata / node-exporter / cAdvisor run.

services:
  monivex:
    image: anasdavoodtk/monivex:latest
    container_name: monivex-hub
    restart: unless-stopped

    # See the host's processes (not just the container's one).
    pid: host
    # See the host's network interfaces + traffic, and bind on the host
    # directly (no docker port mapping needed — SM_BIND is the host port).
    network_mode: host
    # Read every process under /proc and the docker socket without fighting
    # capabilities. Trim to `cap_add: [SYS_PTRACE]` if you prefer.
    privileged: true

    environment:
      SM_MODE: hub
      SM_BIND: 0.0.0.0:8080
      # Host log files the Logs page may tail. Real host paths — /var/log is
      # mounted 1:1 below. (Debian/Ubuntu use syslog/auth.log; RHEL-family
      # use /var/log/messages and /var/log/secure.)
      SM_LOG_PATHS: /var/log/syslog,/var/log/auth.log

    volumes:
      # Persistent state: SQLite DB, JWT secret, API keys, template deployments.
      - ./data:/var/lib/server-monitor
      # Host Docker — powers the Docker page, container controls, and templates.
      - /var/run/docker.sock:/var/run/docker.sock
      # Show the host OS name instead of the container's.
      - /etc/os-release:/etc/os-release:ro
      # Log tailing.
      - /var/log:/var/log:ro

    # ---- GPU hosts ----
    # 1) Install nvidia-container-toolkit on the host.
    # 2) Uncomment the block below.
    # The toolkit injects the host's nvidia-smi + NVML libraries at runtime.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
